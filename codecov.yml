coverage:
  precision: 2
  round: nearest
  range: 70..100

  status:
    project:
      default:
        target: auto
        threshold: 2%
        if_ci_failed: error
    patch:
      default:
        target: 70%
        threshold: 5%
        if_ci_failed: error

comment:
  layout: "condensed_header, diff, flags, files"
  behavior: default
  require_changes: false

flags:
  native-c:
    paths:
      - "*.c"
      - "*.h"
