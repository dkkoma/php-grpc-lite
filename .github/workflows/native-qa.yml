name: Native QA

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: native-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  development-gate:
    name: Development gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: php-grpc-lite-dev:latest
          load: true
          cache-from: type=gha,scope=dev
          cache-to: type=gha,scope=dev,mode=max

      - name: Build test-server image
        uses: docker/build-push-action@v6
        with:
          context: ./poc
          file: ./poc/test-server/Dockerfile
          tags: php-grpc-lite-test-server:latest
          load: true
          cache-from: type=gha,scope=test-server
          cache-to: type=gha,scope=test-server,mode=max

      - name: Build sanitizer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sanitizer
          tags: php-grpc-lite-dev-sanitizer:latest
          load: true
          build-args: |
            SANITIZER=address-undefined
          cache-from: type=gha,scope=dev-sanitizer-address-undefined
          cache-to: type=gha,scope=dev-sanitizer-address-undefined,mode=max

      - name: Install Composer dependencies
        run: docker compose run --rm dev composer install --no-interaction --prefer-dist --no-progress

      - name: Run native development gate
        env:
          COMPOSE_RUN_BUILD: "0"
          FUZZ_RUNS: "1000"
        run: ./tools/test/check-native-development-gate.sh

  c-coverage:
    name: C coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: php-grpc-lite-dev:latest
          load: true
          cache-from: type=gha,scope=dev
          cache-to: type=gha,scope=dev,mode=max

      - name: Build test-server image
        uses: docker/build-push-action@v6
        with:
          context: ./poc
          file: ./poc/test-server/Dockerfile
          tags: php-grpc-lite-test-server:latest
          load: true
          cache-from: type=gha,scope=test-server
          cache-to: type=gha,scope=test-server,mode=max

      - name: Install Composer dependencies
        run: docker compose run --rm dev composer install --no-interaction --prefer-dist --no-progress

      - name: Run C coverage
        run: ./tools/test/check-c-coverage.sh

      - name: Add coverage summary
        if: always()
        run: |
          if [ -f var/coverage/c-lcov/summary.txt ]; then
            {
              echo "## C coverage"
              echo
              echo '```text'
              cat var/coverage/c-lcov/summary.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: c-coverage-lcov
          path: var/coverage/c-lcov/
          if-no-files-found: error
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: var/coverage/c-lcov/codecov.info
          flags: native-c
          name: native-c-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  zts-phpt:
    name: ZTS PHPT
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ZTS dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.zts
          tags: php-grpc-lite-dev-zts:latest
          load: true
          cache-from: type=gha,scope=dev-zts
          cache-to: type=gha,scope=dev-zts,mode=max

      - name: Build test-server image
        uses: docker/build-push-action@v6
        with:
          context: ./poc
          file: ./poc/test-server/Dockerfile
          tags: php-grpc-lite-test-server:latest
          load: true
          cache-from: type=gha,scope=test-server
          cache-to: type=gha,scope=test-server,mode=max

      - name: Install Composer dependencies
        run: docker compose run --rm dev-zts composer install --no-interaction --prefer-dist --no-progress

      - name: Run ZTS PHPT
        run: ./tools/test/check-zts-phpt.sh
