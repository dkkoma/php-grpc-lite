name: Publish diagnostic images

on:
  push:
    branches:
      - test
    paths:
      - ".github/workflows/publish-diagnostic-images.yml"
      - "tools/diagnostics/issue5-spanner-repro/**"
      - "ext/grpc/**"
  workflow_dispatch:
    inputs:
      grpc_official_version:
        description: "official ext-grpc PECL version for the official image"
        required: false
        default: "1.58.0"

concurrency:
  group: publish-diagnostic-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.variant }} repro image
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        variant:
          - official
          - official-frame-trace
          - lite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tools/diagnostics/issue5-spanner-repro/Dockerfile
          push: true
          build-args: |
            GRPC_VARIANT=${{ matrix.variant }}
            GRPC_OFFICIAL_VERSION=${{ inputs.grpc_official_version || '1.58.0' }}
          tags: |
            ghcr.io/dkkoma/php-grpc-lite-spanner-repro:${{ matrix.variant }}
            ghcr.io/dkkoma/php-grpc-lite-spanner-repro:${{ matrix.variant }}-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/dkkoma/php-grpc-lite
            org.opencontainers.image.description=php-grpc-lite Spanner/PubSub/Secret Manager diagnostic repro image
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha,scope=diagnostic-${{ matrix.variant }}
          cache-to: type=gha,scope=diagnostic-${{ matrix.variant }},mode=max
