services:
  dev:
    build: .
    image: php-grpc-lite-dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - test-server
      - spanner-emulator

  dev-sanitizer:
    build:
      context: .
      dockerfile: Dockerfile.sanitizer
      args:
        SANITIZER: address-undefined
    image: php-grpc-lite-dev-sanitizer
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - test-server
      - spanner-emulator

  dev-msan:
    build:
      context: .
      dockerfile: Dockerfile.sanitizer
      args:
        SANITIZER: memory
    image: php-grpc-lite-dev-msan
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - test-server
      - spanner-emulator

  dev-tsan:
    build:
      context: .
      dockerfile: Dockerfile.sanitizer
      args:
        SANITIZER: thread
    image: php-grpc-lite-dev-tsan
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - test-server
      - spanner-emulator

  fpm-lifecycle:
    build:
      context: .
      dockerfile: Dockerfile.fpm
    image: php-grpc-lite-fpm-lifecycle
    volumes:
      - .:/workspace
    working_dir: /workspace
    depends_on:
      - test-server
      - spanner-emulator

  fpm-ext-grpc:
    build:
      context: .
      dockerfile: Dockerfile.fpm-ext-grpc
    image: php-grpc-lite-fpm-ext-grpc
    volumes:
      - .:/workspace
    working_dir: /workspace
    depends_on:
      - test-server
      - spanner-emulator

  test-server:
    build:
      context: ./poc
      dockerfile: test-server/Dockerfile
    image: php-grpc-lite-test-server
    environment:
      TEST_SERVER_GOMAXPROCS: ${TEST_SERVER_GOMAXPROCS:-}
      TEST_SERVER_GRPC_INITIAL_WINDOW_SIZE: ${TEST_SERVER_GRPC_INITIAL_WINDOW_SIZE:-}
      TEST_SERVER_GRPC_INITIAL_CONN_WINDOW_SIZE: ${TEST_SERVER_GRPC_INITIAL_CONN_WINDOW_SIZE:-}
      TEST_SERVER_GRPC_READ_BUFFER_SIZE: ${TEST_SERVER_GRPC_READ_BUFFER_SIZE:-}
      TEST_SERVER_GRPC_WRITE_BUFFER_SIZE: ${TEST_SERVER_GRPC_WRITE_BUFFER_SIZE:-}

  spanner-emulator:
    image: gcr.io/cloud-spanner-emulator/emulator

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:latest

  # Optional local OpenTelemetry viewer for benchmark instrumentation.
  # UI: http://localhost:4319, OTLP/HTTP endpoint from containers:
  # http://otelop:4318/v1/traces
  otelop:
    image: ghcr.io/mashiro/otelop:latest
    environment:
      OTELOP_TRACE_CAP: ${OTELOP_TRACE_CAP:-20000}
    ports:
      - "4317:4317"
      - "4318:4318"
      - "4319:4319"

  # Comparison environment: same workspace, same servers, but with the
  # official ext-grpc loaded. Our PSR-4 Grpc\* classes become dormant and
  # all calls dispatch through the C extension.
  dev-ext-grpc:
    build:
      context: .
      dockerfile: Dockerfile.ext-grpc
    image: php-grpc-lite-dev-ext-grpc
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - test-server
      - spanner-emulator

  # Optional comparison environment for FrankenPHP + grpc-go backend. The Go
  # backend is fetched from GitHub by ref so this path is CI-reproducible and
  # does not depend on a sibling checkout.
  dev-franken-grpc-go:
    build:
      context: .
      dockerfile: Dockerfile.franken-grpc-go
      args:
        FRANKEN_GRPC_GO_CLIENT_REF: ${FRANKEN_GRPC_GO_CLIENT_REF:-main}
    image: php-grpc-lite-dev-franken-grpc-go
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - test-server
      - spanner-emulator
