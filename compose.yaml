services:
  dev:
    build: .
    image: php-grpc-lite-dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - test-server

  test-server:
    build:
      context: ./poc
      dockerfile: test-server/Dockerfile
    image: php-grpc-lite-test-server
    ports:
      - "50051:50051"
      - "50052:50052"
