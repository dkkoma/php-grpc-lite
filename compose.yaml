services:
  dev:
    build: .
    image: php-grpc-lite-dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - test-server
      - spanner-emulator

  test-server:
    build:
      context: ./poc
      dockerfile: test-server/Dockerfile
    image: php-grpc-lite-test-server

  spanner-emulator:
    image: gcr.io/cloud-spanner-emulator/emulator
