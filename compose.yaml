services:
  dev:
    build: .
    image: php-grpc-lite-dev
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - test-server
      - spanner-emulator

  dev-zts:
    build:
      context: .
      dockerfile: Dockerfile.zts
    image: php-grpc-lite-dev-zts
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - test-server
      - spanner-emulator

  dev-sanitizer:
    build:
      context: .
      dockerfile: Dockerfile.sanitizer
      args:
        SANITIZER: address-undefined
    image: php-grpc-lite-dev-sanitizer
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - test-server
      - spanner-emulator

  dev-msan:
    build:
      context: .
      dockerfile: Dockerfile.sanitizer
      args:
        SANITIZER: memory
    image: php-grpc-lite-dev-msan
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - test-server
      - spanner-emulator

  dev-tsan:
    build:
      context: .
      dockerfile: Dockerfile.sanitizer
      args:
        SANITIZER: thread
    image: php-grpc-lite-dev-tsan
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - test-server
      - spanner-emulator

  fpm-lifecycle:
    build:
      context: .
      dockerfile: Dockerfile.fpm
    image: php-grpc-lite-fpm-lifecycle
    volumes:
      - .:/workspace
    working_dir: /workspace
    depends_on:
      - test-server
      - spanner-emulator

  fpm-ext-grpc:
    build:
      context: .
      dockerfile: Dockerfile.fpm-ext-grpc
    image: php-grpc-lite-fpm-ext-grpc
    volumes:
      - .:/workspace
    working_dir: /workspace
    depends_on:
      - test-server
      - spanner-emulator

  fpm-lifecycle-16:
    build:
      context: .
      dockerfile: Dockerfile.fpm
      args:
        FPM_MAX_CHILDREN: 16
    image: php-grpc-lite-fpm-lifecycle-16
    cpus: 4.0
    volumes:
      - .:/workspace
      - ${HOME}/.config/gcloud:/var/www/.config/gcloud:ro
    working_dir: /workspace
    environment:
      HOME: /var/www
      NATIVE_GRPC_SO: ${NATIVE_GRPC_SO:-/workspace/ext/grpc/modules/grpc.so}
      BENCH_TRANSPORT_IMPL: ${BENCH_TRANSPORT_IMPL:-grpc-lite}
      LARAVEL_SPANNER_TRACE: ${LARAVEL_SPANNER_TRACE:-}
      LARAVEL_SPANNER_TRACE_FILE: ${LARAVEL_SPANNER_TRACE_FILE:-}
      GRPC_LITE_TRACE_FILE: ${GRPC_LITE_TRACE_FILE:-}
      SPANNER_EMULATOR_HOST: ${LARAVEL_SPANNER_EMULATOR_HOST-spanner-emulator:9010}
      DB_SPANNER_PROJECT_ID: ${LARAVEL_SPANNER_PROJECT_ID:-test-project}
      DB_SPANNER_INSTANCE_ID: ${LARAVEL_SPANNER_INSTANCE_ID:-laravel-bench-instance}
      DB_SPANNER_DATABASE_ID: ${LARAVEL_SPANNER_DATABASE_ID:-laravel-bench-db}
      LARAVEL_SPANNER_MIN_SESSIONS: ${LARAVEL_SPANNER_MIN_SESSIONS:-16}
    command:
      - sh
      - -lc
      - |
        mkdir -p /workspace/tools/benchmark/laravel-spanner-app/storage/framework/spanner /workspace/tools/benchmark/laravel-spanner-app/storage/framework/views /workspace/tools/benchmark/laravel-spanner-app/storage/logs /workspace/tools/benchmark/laravel-spanner-app/bootstrap/cache
        chown -R www-data:www-data /workspace/tools/benchmark/laravel-spanner-app/storage /workspace/tools/benchmark/laravel-spanner-app/bootstrap/cache
        su -s /bin/sh www-data -c 'php -d extension=${NATIVE_GRPC_SO:-/workspace/ext/grpc/modules/grpc.so} /workspace/tools/benchmark/laravel-spanner-app/bin/startup-warmup.php'
        exec php-fpm -F -d extension=${NATIVE_GRPC_SO:-/workspace/ext/grpc/modules/grpc.so}
    depends_on:
      - test-server
      - spanner-emulator

  fpm-lifecycle-profile:
    build:
      context: .
      dockerfile: Dockerfile.fpm-profile
    image: php-grpc-lite-fpm-lifecycle-profile
    cpus: 4.0
    volumes:
      - .:/workspace
      - ${HOME}/.config/gcloud:/var/www/.config/gcloud:ro
    working_dir: /workspace
    environment:
      HOME: /var/www
      NATIVE_GRPC_SO: ${NATIVE_GRPC_SO:-/workspace/ext/grpc/modules/grpc.so}
      BENCH_TRANSPORT_IMPL: ${BENCH_TRANSPORT_IMPL:-grpc-lite}
      LARAVEL_SPANNER_TRACE: ${LARAVEL_SPANNER_TRACE:-}
      LARAVEL_SPANNER_TRACE_FILE: ${LARAVEL_SPANNER_TRACE_FILE:-}
      GRPC_LITE_TRACE_FILE: ${GRPC_LITE_TRACE_FILE:-}
      SPANNER_EMULATOR_HOST: ${LARAVEL_SPANNER_EMULATOR_HOST-spanner-emulator:9010}
      DB_SPANNER_PROJECT_ID: ${LARAVEL_SPANNER_PROJECT_ID:-test-project}
      DB_SPANNER_INSTANCE_ID: ${LARAVEL_SPANNER_INSTANCE_ID:-laravel-bench-instance}
      DB_SPANNER_DATABASE_ID: ${LARAVEL_SPANNER_DATABASE_ID:-laravel-bench-db}
      LARAVEL_SPANNER_MIN_SESSIONS: ${LARAVEL_SPANNER_MIN_SESSIONS:-16}
    command:
      - sh
      - -lc
      - |
        mkdir -p /workspace/tools/benchmark/laravel-spanner-app/storage/framework/spanner /workspace/tools/benchmark/laravel-spanner-app/storage/framework/views /workspace/tools/benchmark/laravel-spanner-app/storage/logs /workspace/tools/benchmark/laravel-spanner-app/bootstrap/cache
        chown -R www-data:www-data /workspace/tools/benchmark/laravel-spanner-app/storage /workspace/tools/benchmark/laravel-spanner-app/bootstrap/cache
        su -s /bin/sh www-data -c 'php -d extension=${NATIVE_GRPC_SO:-/workspace/ext/grpc/modules/grpc.so} /workspace/tools/benchmark/laravel-spanner-app/bin/startup-warmup.php'
        exec php-fpm -F -d extension=${NATIVE_GRPC_SO:-/workspace/ext/grpc/modules/grpc.so}
    depends_on:
      - test-server
      - spanner-emulator

  fpm-lifecycle-callgrind:
    build:
      context: .
      dockerfile: Dockerfile.fpm-profile
    image: php-grpc-lite-fpm-lifecycle-profile
    cpus: 4.0
    volumes:
      - .:/workspace
      - ${HOME}/.config/gcloud:/var/www/.config/gcloud:ro
    working_dir: /workspace
    environment:
      HOME: /var/www
      NATIVE_GRPC_SO: ${NATIVE_GRPC_SO:-/workspace/ext/grpc/modules/grpc.so}
      BENCH_TRANSPORT_IMPL: ${BENCH_TRANSPORT_IMPL:-grpc-lite}
      LARAVEL_SPANNER_TRACE: ${LARAVEL_SPANNER_TRACE:-}
      LARAVEL_SPANNER_TRACE_FILE: ${LARAVEL_SPANNER_TRACE_FILE:-}
      GRPC_LITE_TRACE_FILE: ${GRPC_LITE_TRACE_FILE:-}
      SPANNER_EMULATOR_HOST: ${LARAVEL_SPANNER_EMULATOR_HOST-spanner-emulator:9010}
      DB_SPANNER_PROJECT_ID: ${LARAVEL_SPANNER_PROJECT_ID:-test-project}
      DB_SPANNER_INSTANCE_ID: ${LARAVEL_SPANNER_INSTANCE_ID:-laravel-bench-instance}
      DB_SPANNER_DATABASE_ID: ${LARAVEL_SPANNER_DATABASE_ID:-laravel-bench-db}
      LARAVEL_SPANNER_MIN_SESSIONS: ${LARAVEL_SPANNER_MIN_SESSIONS:-16}
      FPM_CALLGRIND_LOG_DIR: ${FPM_CALLGRIND_LOG_DIR:-var/bench-results/fpm-laravel-spanner-callgrind}
    command:
      - sh
      - -lc
      - |
        mkdir -p /workspace/tools/benchmark/laravel-spanner-app/storage/framework/spanner /workspace/tools/benchmark/laravel-spanner-app/storage/framework/views /workspace/tools/benchmark/laravel-spanner-app/storage/logs /workspace/tools/benchmark/laravel-spanner-app/bootstrap/cache /workspace/$$FPM_CALLGRIND_LOG_DIR
        chown -R www-data:www-data /workspace/tools/benchmark/laravel-spanner-app/storage /workspace/tools/benchmark/laravel-spanner-app/bootstrap/cache /workspace/$$FPM_CALLGRIND_LOG_DIR
        su -s /bin/sh www-data -c 'php -d extension=${NATIVE_GRPC_SO:-/workspace/ext/grpc/modules/grpc.so} /workspace/tools/benchmark/laravel-spanner-app/bin/startup-warmup.php'
        exec valgrind --tool=callgrind --trace-children=yes --instr-atstart=yes --callgrind-out-file=/workspace/$$FPM_CALLGRIND_LOG_DIR/callgrind.out.%p php-fpm -F -d extension=${NATIVE_GRPC_SO:-/workspace/ext/grpc/modules/grpc.so}
    depends_on:
      - test-server
      - spanner-emulator

  fpm-ext-grpc-16:
    build:
      context: .
      dockerfile: Dockerfile.fpm-ext-grpc
      args:
        FPM_MAX_CHILDREN: 16
    image: php-grpc-lite-fpm-ext-grpc-16
    cpus: 4.0
    volumes:
      - .:/workspace
      - ${HOME}/.config/gcloud:/var/www/.config/gcloud:ro
    working_dir: /workspace
    environment:
      HOME: /var/www
      BENCH_TRANSPORT_IMPL: ${BENCH_TRANSPORT_IMPL:-ext-grpc}
      LARAVEL_SPANNER_TRACE: ${LARAVEL_SPANNER_TRACE:-}
      LARAVEL_SPANNER_TRACE_FILE: ${LARAVEL_SPANNER_TRACE_FILE:-}
      GRPC_LITE_TRACE_FILE: ${GRPC_LITE_TRACE_FILE:-}
      SPANNER_EMULATOR_HOST: ${LARAVEL_SPANNER_EMULATOR_HOST-spanner-emulator:9010}
      DB_SPANNER_PROJECT_ID: ${LARAVEL_SPANNER_PROJECT_ID:-test-project}
      DB_SPANNER_INSTANCE_ID: ${LARAVEL_SPANNER_INSTANCE_ID:-laravel-bench-instance}
      DB_SPANNER_DATABASE_ID: ${LARAVEL_SPANNER_DATABASE_ID:-laravel-bench-db}
      LARAVEL_SPANNER_MIN_SESSIONS: ${LARAVEL_SPANNER_MIN_SESSIONS:-16}
    command:
      - sh
      - -lc
      - |
        mkdir -p /workspace/tools/benchmark/laravel-spanner-app/storage/framework/spanner /workspace/tools/benchmark/laravel-spanner-app/storage/framework/views /workspace/tools/benchmark/laravel-spanner-app/storage/logs /workspace/tools/benchmark/laravel-spanner-app/bootstrap/cache
        chown -R www-data:www-data /workspace/tools/benchmark/laravel-spanner-app/storage /workspace/tools/benchmark/laravel-spanner-app/bootstrap/cache
        su -s /bin/sh www-data -c 'php /workspace/tools/benchmark/laravel-spanner-app/bin/startup-warmup.php'
        exec php-fpm -F
    depends_on:
      - test-server
      - spanner-emulator

  nginx-laravel-native:
    image: nginx:1.27-alpine
    volumes:
      - .:/workspace:ro
      - ./tools/benchmark/nginx/laravel-spanner.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      FPM_UPSTREAM: fpm-lifecycle-16
      SPANNER_EMULATOR_HOST: ${LARAVEL_SPANNER_EMULATOR_HOST-spanner-emulator:9010}
      DB_SPANNER_PROJECT_ID: ${LARAVEL_SPANNER_PROJECT_ID:-test-project}
      DB_SPANNER_INSTANCE_ID: ${LARAVEL_SPANNER_INSTANCE_ID:-laravel-bench-instance}
      DB_SPANNER_DATABASE_ID: ${LARAVEL_SPANNER_DATABASE_ID:-laravel-bench-db}
    depends_on:
      - fpm-lifecycle-16

  nginx-laravel-profile:
    image: nginx:1.27-alpine
    volumes:
      - .:/workspace:ro
      - ./tools/benchmark/nginx/laravel-spanner.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      FPM_UPSTREAM: fpm-lifecycle-profile
      SPANNER_EMULATOR_HOST: ${LARAVEL_SPANNER_EMULATOR_HOST-spanner-emulator:9010}
      DB_SPANNER_PROJECT_ID: ${LARAVEL_SPANNER_PROJECT_ID:-test-project}
      DB_SPANNER_INSTANCE_ID: ${LARAVEL_SPANNER_INSTANCE_ID:-laravel-bench-instance}
      DB_SPANNER_DATABASE_ID: ${LARAVEL_SPANNER_DATABASE_ID:-laravel-bench-db}
    depends_on:
      - fpm-lifecycle-profile

  nginx-laravel-callgrind:
    image: nginx:1.27-alpine
    volumes:
      - .:/workspace:ro
      - ./tools/benchmark/nginx/laravel-spanner.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      FPM_UPSTREAM: fpm-lifecycle-callgrind
      SPANNER_EMULATOR_HOST: ${LARAVEL_SPANNER_EMULATOR_HOST-spanner-emulator:9010}
      DB_SPANNER_PROJECT_ID: ${LARAVEL_SPANNER_PROJECT_ID:-test-project}
      DB_SPANNER_INSTANCE_ID: ${LARAVEL_SPANNER_INSTANCE_ID:-laravel-bench-instance}
      DB_SPANNER_DATABASE_ID: ${LARAVEL_SPANNER_DATABASE_ID:-laravel-bench-db}
    depends_on:
      - fpm-lifecycle-callgrind

  nginx-laravel-ext-grpc:
    image: nginx:1.27-alpine
    volumes:
      - .:/workspace:ro
      - ./tools/benchmark/nginx/laravel-spanner.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      FPM_UPSTREAM: fpm-ext-grpc-16
      SPANNER_EMULATOR_HOST: ${LARAVEL_SPANNER_EMULATOR_HOST-spanner-emulator:9010}
      DB_SPANNER_PROJECT_ID: ${LARAVEL_SPANNER_PROJECT_ID:-test-project}
      DB_SPANNER_INSTANCE_ID: ${LARAVEL_SPANNER_INSTANCE_ID:-laravel-bench-instance}
      DB_SPANNER_DATABASE_ID: ${LARAVEL_SPANNER_DATABASE_ID:-laravel-bench-db}
    depends_on:
      - fpm-ext-grpc-16

  loadgen:
    build:
      context: .
      dockerfile: Dockerfile.loadgen
    image: php-grpc-lite-loadgen

  test-server:
    build:
      context: ./poc
      dockerfile: test-server/Dockerfile
    image: php-grpc-lite-test-server
    environment:
      TEST_SERVER_GOMAXPROCS: ${TEST_SERVER_GOMAXPROCS:-}
      TEST_SERVER_GRPC_INITIAL_WINDOW_SIZE: ${TEST_SERVER_GRPC_INITIAL_WINDOW_SIZE:-}
      TEST_SERVER_GRPC_INITIAL_CONN_WINDOW_SIZE: ${TEST_SERVER_GRPC_INITIAL_CONN_WINDOW_SIZE:-}
      TEST_SERVER_GRPC_READ_BUFFER_SIZE: ${TEST_SERVER_GRPC_READ_BUFFER_SIZE:-}
      TEST_SERVER_GRPC_WRITE_BUFFER_SIZE: ${TEST_SERVER_GRPC_WRITE_BUFFER_SIZE:-}

  spanner-emulator:
    image: gcr.io/cloud-spanner-emulator/emulator

  spanner-omni:
    profiles:
      - spanner-omni
    image: us-docker.pkg.dev/spanner-omni/images/spanner-omni:2026.r1-beta
    entrypoint:
      - /bin/tini
      - --
    command:
      - sh
      - -c
      - |
        /google/spanner/bin/spanner start-single-server &
        sleep 5
        /app/bin/spanner-console &
        wait
    volumes:
      - spanner-omni-data:/spanner
    ports:
      - "15000:15000"
      - "15026:15026"

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:latest

  # Optional local OpenTelemetry viewer for benchmark instrumentation.
  # UI: http://localhost:4319, OTLP/HTTP endpoint from containers:
  # http://otelop:4318/v1/traces
  otelop:
    image: ghcr.io/mashiro/otelop:latest
    environment:
      OTELOP_TRACE_CAP: ${OTELOP_TRACE_CAP:-20000}
    ports:
      - "4317:4317"
      - "4318:4318"
      - "4319:4319"

  # Comparison environment: same workspace, same servers, but with the
  # official ext-grpc loaded. Our PSR-4 Grpc\* classes become dormant and
  # all calls dispatch through the C extension.
  dev-ext-grpc:
    build:
      context: .
      dockerfile: Dockerfile.ext-grpc
    image: php-grpc-lite-dev-ext-grpc
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - test-server
      - spanner-emulator

  # Optional comparison environment for FrankenPHP + grpc-go backend. The Go
  # backend is fetched from GitHub by ref so this path is CI-reproducible and
  # does not depend on a sibling checkout.
  dev-franken-grpc-go:
    build:
      context: .
      dockerfile: Dockerfile.franken-grpc-go
      args:
        FRANKEN_GRPC_GO_CLIENT_REF: ${FRANKEN_GRPC_GO_CLIENT_REF:-main}
    image: php-grpc-lite-dev-franken-grpc-go
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    depends_on:
      - test-server
      - spanner-emulator

volumes:
  spanner-omni-data:
