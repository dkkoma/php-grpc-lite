syntax = "proto3";

package helloworld;

option go_package = "example.com/helloworld/pb";

service Greeter {
  rpc SayHello (HelloRequest) returns (HelloReply) {}
  rpc SayManyHellos (HelloRequest) returns (stream HelloReply) {}
}

message HelloRequest {
  string name = 1;
  // If > 0, server sleeps this many milliseconds before responding.
  // Used by latency benchmarks to simulate realistic server-side processing time.
  int32 delay_ms = 2;
}

message HelloReply {
  string message = 1;
}
